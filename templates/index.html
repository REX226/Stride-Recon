<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRIDE RECON | 10-Tool Automation</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --accent: #238636;
            --text: #c9d1d9;
            --terminal: #00ff41;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .search-section {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            margin-bottom: 30px;
        }

        input {
            padding: 12px 20px;
            width: 60%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 30px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; }

        #loader { display: none; margin-top: 20px; }
        .status-msg { font-family: monospace; color: #58a6ff; margin-bottom: 10px; }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 30%;
            background: #58a6ff;
            animation: loading 2s infinite ease-in-out;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .tool-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .tool-header {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            color: #8b949e;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .terminal-window {
            background: #000;
            color: var(--terminal);
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 11px;
            padding: 10px;
            height: 180px;
            overflow-y: auto;
            border-radius: 4px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚀 STRIDE RECON <small style="font-size: 12px; color: var(--accent);">v2.0 Turbo</small></h1>
        <div id="scan-status" style="font-family: monospace;">SYSTEM READY</div>
    </div>

    <div class="search-section">
        <input type="text" id="targetURL" placeholder="Enter target domain (e.g. example.com)">
        <button onclick="runDiscovery()">EXPLORE ASSETS</button>
        
        <div id="loader">
            <div class="status-msg">> Initializing Parallel 10-Tool Pipeline...</div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
    </div>

    <div class="dashboard" id="resultsGrid">
        </div>
</div>

<script>
    async function runDiscovery() {
        const target = document.getElementById('targetURL').value;
        if (!target) return alert("Target domain required!");

        const grid = document.getElementById('resultsGrid');
        const loader = document.getElementById('loader');
        const status = document.getElementById('scan-status');

        grid.innerHTML = ""; // Clear old results
        loader.style.display = "block";
        status.innerText = "SCANNING...";
        status.style.color = "#f1e05a";

        try {
            const response = await fetch('/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: target })
            });

            const data = await response.json();
            loader.style.display = "none";
            status.innerText = "SCAN COMPLETE";
            status.style.color = "#238636";

            // Loop through all 10 tools returned in the JSON
            for (const [tool, logs] of Object.entries(data)) {
                const card = document.createElement('div');
                card.className = 'tool-card';
                
                // Clean up tool name for display
                const displayName = tool.replace('_', ' ').toUpperCase();
                const content = Array.isArray(logs) ? logs.join('\n') : logs;

                card.innerHTML = `
                    <div class="tool-header">${displayName}</div>
                    <div class="terminal-window">${content || 'No data retrieved.'}</div>
                `;
                grid.appendChild(card);
            }

        } catch (error) {
            loader.style.display = "none";
            status.innerText = "ERROR";
            status.style.color = "#da3633";
            console.error("Pipeline crash:", error);
            alert("The pipeline was interrupted. Check your Python terminal for errors.");
        }
    }
</script>

</body>
</html>
